# Render Blueprint — deploy the ProofLens API + Postgres from this Git repo.
# In Render: New → Blueprint → connect this repo. Free-tier friendly.
#
# The async worker is intentionally omitted (Render background workers need a
# paid plan). The UI + /v1/score are fully served by the `api` web service; the
# worker is only needed for the async LSQ webhook path (see DEPLOYMENT.md).

databases:
  - name: prooflens-db
    plan: free
    databaseName: prooflens
    user: prooflens

services:
  - type: web
    name: prooflens-api
    runtime: docker
    plan: free
    dockerfilePath: ./deploy/Dockerfile
    dockerContext: .
    healthCheckPath: /healthz
    # Migrate + seed + serve on Render's $PORT. Kept as a script so the command
    # is simple and quote-free (Render doesn't run dockerCommand through a shell,
    # so inline &&/quotes/$PORT would be treated as one literal command).
    dockerCommand: sh scripts/start-api.sh
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: prooflens-db
          property: connectionString
      - key: PROOFLENS_SECRET_KEY
        generateValue: true          # Render generates a strong secret
      - key: PROOFLENS_ADMIN_TOKEN
        generateValue: true
      # --- Live AI (vision) --------------------------------------------------
      # "Live AI" in the UI uses whatever provider VISION_BACKEND names. Leave it
      # "stub" for the deterministic demo model; set it to a funded provider below
      # to enable a real model. Add ONLY the key for the provider you choose.
      - key: VISION_BACKEND
        value: stub                  # stub | openrouter | aimlapi | gemini
      - key: OPENROUTER_API_KEY
        sync: false                  # sk-or-v1-… (free models are rate-limited/weak; paid needs credits)
      - key: OPENROUTER_MODEL
        sync: false                  # e.g. openai/gpt-4o-mini (with credits) or a *:free model
      - key: AIMLAPI_API_KEY
        sync: false                  # 32-hex key from aimlapi.com (needs balance for gpt-4o-mini)
      - key: AIMLAPI_MODEL
        sync: false                  # default openai/gpt-4o-mini
      - key: GEMINI_API_KEY
        sync: false                  # AIza… from Google AI Studio — genuinely free tier, accurate
      - key: CORS_ORIGINS
        sync: false                  # set to your Vercel URL after the frontend deploys
      - key: PYTHONUNBUFFERED
        value: "1"
