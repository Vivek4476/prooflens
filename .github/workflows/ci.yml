name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: lint · types · tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install (engine + service + dev; stub backend only, no real vision deps)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,service]"

      - name: Ruff
        run: ruff check src tests scripts migrations

      - name: Mypy
        run: mypy src

      - name: Pytest (unit + integration, fully offline — stub backend, Fake LSQ)
        run: pytest -m "not golden"

  golden:
    name: golden set (band + reason regression)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install (engine + dev; offline stub backend)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # Any rubric/fusion/copy change that shifts an outcome fails here unless the
      # golden expectations are updated in the same PR. Fully offline.
      - name: Golden set
        run: pytest -m golden tests/golden

  # TODO(Phase 3): add a `docker` job — build deploy/Dockerfile and, on `main`,
  # push the image to GHCR tagged with the git SHA. Added with the Dockerfile.
