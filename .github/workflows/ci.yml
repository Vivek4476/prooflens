name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: lint · types · tests · golden
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install (engine + dev; offline stub backend, no real vision deps)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff
        run: ruff check src tests scripts migrations

      - name: Mypy
        run: mypy src

      - name: Pytest (unit + integration + golden, fully offline)
        run: pytest

  # The golden set runs inside pytest above (stub backend, Fake LSQ, no network),
  # so any rubric/fusion/copy change that shifts an outcome fails this job unless
  # the golden expectations are updated in the same PR.
  #
  # TODO(Phase 3): add a `docker` job — build deploy/Dockerfile and, on `main`,
  # push the image to GHCR tagged with the git SHA. Added with the Dockerfile.
